# GitHub Actions workflow for automated releases to PyPI and Docker Hub
# 
# This workflow now works without needing access to a real Immich server.
# The setup_venv.sh script will use a hardcoded fallback version (v2.4.1)
# when no Immich configuration is available, which is the case in CI/CD environments.
#
# The workflow triggers on:
# - Push of version tags (v*.*.*)
# - Manual dispatch from GitHub UI

name: Release to PyPI and Docker Hub

on:
  push:
    tags:
      - 'v*.*.*'   # Only triggers on tags like v0.70.1
  workflow_dispatch:  # Allows manual launch from the UI

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Read tested Immich version
        id: read_tested
        run: |
          if [ -f compatibility.yml ]; then
            TESTED=$(grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' compatibility.yml | head -n1 || true)
            if [ -n "$TESTED" ]; then
              echo "TESTED_IMMICH=$TESTED" >> $GITHUB_ENV
              echo "Found tested immich version: $TESTED"
            else
              echo "No tested immich version found in compatibility.yml" >&2
            fi
          else
            echo "compatibility.yml not found, no tested immich version set" >&2
          fi

      - name: Build and upload Python package (incluye immich_client)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          echo "Using TESTED_IMMICH=${{ env.TESTED_IMMICH }}"
          bash scripts/pypi/package_and_upload.sh --immich-version "${{ env.TESTED_IMMICH }}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Docker image (cron)
        run: |
          docker build -t txemi/immich-autotag:cron-${{ steps.get_version.outputs.version }} -t txemi/immich-autotag:cron -f Dockerfile.cron .

      - name: Build Docker image (main)
        run: |
          docker build -t txemi/immich-autotag:${{ steps.get_version.outputs.version }} -t txemi/immich-autotag:latest -f Dockerfile .

      - name: Push Docker images (cron)
        run: |
          docker push txemi/immich-autotag:cron-${{ steps.get_version.outputs.version }}
          docker push txemi/immich-autotag:cron

      - name: Push Docker images (main)
        run: |
          docker push txemi/immich-autotag:${{ steps.get_version.outputs.version }}
          docker push txemi/immich-autotag:latest
