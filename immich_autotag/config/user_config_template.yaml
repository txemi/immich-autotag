description: 'This configuration file provides values for all attributes required
  by the Immich autotag system. Each attribute is documented inline with comments
  explaining its purpose and selection rationale. For the most authoritative and up-to-date
  documentation of the configuration classes and their fields, please refer to the
  source code: https://github.com/txemi/immich-autotag/blob/main/immich_autotag/config/models.py

  Note: The above link points to the ''main'' branch. If you are running a different
  branch, please adapt the URL to match your current branch for accurate reference.'
server:
  description: 'Connection details for the Immich server API. Get your API key in
    Immich: Account Settings → API Keys → New key.'  
  # Immich domain or IP (fill in by user)
  host: "<YOUR_HOST_OR_IP_HERE>"
  # Port where Immich listens
  port: 2283
  # Immich API key (fill in by user)
  api_key: "<YOUR_API_KEY_HERE>"
enable_album_name_strip: true
skip:
  description: Controls how many assets to skip and whether to resume from the last
    successful position. Use skip_n for a manual offset; resume_previous resumes automatically
    after an interrupted run; max_items caps the number of assets processed in a single
    run.
  skip_n: 0
  resume_previous: true
  max_items: 1000000
filters:
  description: Global asset filter applied before any processing. filter_in limits
    processing to assets that match at least one rule; filter_out excludes assets
    that match any rule. Leave both lists empty to process all assets.
  filter_in: []
  filter_out: []
conversions:
  enabled: true
  description: Batch conversion rules applied before classification. Use these to
    consolidate legacy tag variants into canonical input tags so that classification
    rules only need to check one name per category. MOVE mode removes the source tag/album
    after copying to the destination; COPY mode adds the destination while keeping
    the source.
  conversions:
  - source:
      tag_names:
      - meme
      - autotag_input_meme
      album_name_patterns: null
      asset_links: null
      description: null
    destination:
      album_names:
      - autotag_input_meme
      tag_names: null
    mode: move
    description: Merge the bare 'meme' tag (legacy, no prefix) into the canonical
      input album. MOVE mode removes the old tag after copying.
  - source:
      tag_names:
      - adult_meme
      - autotag_input_adult_meme
      album_name_patterns: null
      asset_links: null
      description: null
    destination:
      album_names:
      - autotag_input_adult_meme
      tag_names: null
    mode: move
    description: Merge the bare 'adult_meme' tag (legacy, no prefix) into the canonical
      input album. MOVE mode removes the old tag after copying.
classification:
  description: Defines what 'classified' means for your library. Each rule describes
    one category (matched by tag name, album name, or regex pattern). Assets matching
    exactly one rule are considered classified. Assets matching none are tagged autotag_output_unknown.
    Assets matching more than one are tagged autotag_output_conflict. Both states
    are easy to find and fix in the Immich UI.
  rules:
  - tag_names:
    - meme
    - autotag_input_meme
    album_name_patterns:
    - ^autotag_input_meme$
    asset_links: null
    description: Memes/jokes — not events, excluded from date-based albums.
  - tag_names:
    - adult_meme
    - autotag_input_adult_meme
    album_name_patterns:
    - ^autotag_input_adult_meme$
    asset_links: null
    description: Adult/NSFW content — separated from the family environment.
  - tag_names:
    - autotag_input_pending_review
    album_name_patterns:
    - ^autotag_input_pending_review$
    asset_links: null
    description: Assets that still need a destination decision.
  - tag_names:
    - autotag_input_ignore
    album_name_patterns:
    - ^autotag_input_ignore$
    asset_links: null
    description: Assets explicitly discarded from the main processing flow.
  - tag_names:
    - autotag_input_broken
    album_name_patterns:
    - ^autotag_input_broken$
    asset_links: null
    description: Assets detected as broken or corrupted during processing. Kept in
      a separate category so they do not pollute other albums.
  - tag_names: null
    album_name_patterns:
    - ^\d{4}-(\d{2}(-\d{2})?)?
    asset_links: null
    description: Event albums identified by a date prefix in the album name.
  autotag_unknown: autotag_output_unknown
  autotag_conflict: autotag_output_conflict
duplicate_processing:
  description: Synchronises albums, tags, and dates between assets that Immich has
    identified as duplicates. Any inconsistency between duplicates — different albums,
    different classification, or different capture dates — is flagged with a dedicated
    output tag so you can review and resolve it.
  autotag_album_conflict: autotag_output_duplicate_asset_album_conflict
  autotag_classification_conflict: autotag_output_duplicate_asset_classification_conflict
  autotag_classification_conflict_prefix: autotag_output_duplicate_asset_classification_conflict_
  autotag_album_detection_conflict: autotag_output_album_detection_conflict
  date_correction:
    description: Attempts to recover a more accurate capture date for each asset by
      extracting a date from the filename (e.g. WhatsApp or Android naming conventions)
      or inheriting it from a confirmed duplicate. extraction_timezone is applied
      when the extracted date string contains no timezone information.
    enabled: true
    extraction_timezone: Europe/Madrid
album_date_consistency:
  description: 'Checks that every asset in a date-named album (e.g. ''2024-07-15 Beach
    trip'') was actually taken within threshold_days of the album''s date. Outliers
    are tagged autotag_output_album_date_mismatch for review. Recommended workflow:
    start at 180 days and tighten progressively (180 → 90 → 60 → 30 → 7) as you fix
    each batch of mismatches.'
  enabled: true
  autotag_album_date_mismatch: autotag_output_album_date_mismatch
  threshold_days: 180
album_detection_from_folders:
  description: Scans each asset's file path for a date-containing folder and assigns
    (or creates) a matching album. Useful when files are already organised into event
    folders on disk. Paths matching any pattern in excluded_paths are ignored (e.g.
    WhatsApp media dumps that should not become albums).
  enabled: false
  excluded_paths:
  - whatsapp
performance:
  description: Runtime performance and error-handling settings. Disable enable_type_checking
    in production for a ~50 % speed gain; keep it True during development to catch
    type errors early. Set fail_fast_on_asset_errors=True to stop on the first asset
    error instead of logging it and continuing to the next asset.
  enable_type_checking: true
  fail_fast_on_asset_errors: false
album_permissions:
  description: 'Automatically shares albums with groups of users based on keywords
    in the album name, instead of managing permissions one by one in the Immich UI.
    On each run the rules are enforced: users in a group gain access to matching albums;
    users removed from a group lose access.'
  enabled: true
  user_groups:
  - name: family
    description: Family members
    members:
    - grandpa@example.com
    - grandma@example.com
    - mother@example.com
  - name: friends
    description: Close friends
    members:
    - john@example.com
    - jane@example.com
  selection_rules:
  - name: Share Family albums
    keyword: family
    groups:
    - family
    access: view
  - name: Share Friends albums
    keyword: friends
    groups:
    - friends
    access: view
  log_unmatched: false
create_album_from_date_if_missing: true
